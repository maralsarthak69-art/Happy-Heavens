services:
  - type: web
    name: happy-heavens
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --workers 2 --threads 2 --timeout 60 --max-requests 1000 --max-requests-jitter 100"
    envVars:
      - key: RENDER
        value: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_HOST
        sync: false          # your domain e.g. happyheavens.com
      - key: DATABASE_URL
        sync: false          # Supabase pooler URL
      - key: CLOUD_NAME
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: STORE_OWNER_EMAIL
        sync: false
