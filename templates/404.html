<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Happy Heavens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-white flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-100 h-20 flex items-center">
        <div class="container mx-auto px-8">
            <a href="/" class="text-3xl font-serif tracking-tighter text-black lowercase">
                happy heavens
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-8 py-24">
        <div class="text-center max-w-xl">
            <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-[#FB7185] mb-6">Error 404</p>
            <h1 class="font-serif text-6xl md:text-8xl text-black leading-[0.9] tracking-tighter mb-8">
                Page Not<br>
                <span class="italic text-gray-400">Found.</span>
            </h1>
            <p class="text-gray-500 text-sm font-light leading-relaxed mb-12 max-w-sm mx-auto">
                The page you're looking for has moved, been removed, or never existed. 
                Let's get you back to something beautiful.
            </p>
            <a href="/"
               class="inline-block px-8 py-4 bg-black text-white text-[10px] uppercase tracking-[0.2em] font-bold hover:bg-[#FB7185] transition-colors duration-300">
                Back to Home
            </a>
        </div>
    </main>

    <footer class="border-t border-gray-100 py-8">
        <div class="container mx-auto px-8 flex justify-between items-center text-[10px] text-gray-400 uppercase tracking-widest font-medium">
            <p>&copy; 2026 Happy Heavens. Pune, India.</p>
        </div>
    </footer>

</body>
</html>
