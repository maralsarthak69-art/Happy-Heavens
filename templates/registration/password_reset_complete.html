{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-white py-20 px-4">
    <div class="w-full max-w-md text-center">

        <span class="text-[#FB7185] font-bold tracking-[0.3em] uppercase text-[10px] mb-4 block">All Done</span>
        <h1 class="font-serif text-4xl md:text-5xl text-black mb-4">Password Reset</h1>
        <p class="text-gray-400 text-xs tracking-widest uppercase mb-8">
            Your password has been set. You can now log in.
        </p>
        <a href="{% url 'login' %}" class="text-[10px] uppercase tracking-widest text-gray-500 hover:text-black border-b border-transparent hover:border-black transition-all">
            Go to Login
        </a>

    </div>
</div>
{% endblock %}
