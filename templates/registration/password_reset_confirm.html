{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-white py-20 px-4">
    <div class="w-full max-w-md">

        <div class="text-center mb-10">
            <span class="text-[#FB7185] font-bold tracking-[0.3em] uppercase text-[10px] mb-4 block">Set New Password</span>
            <h1 class="font-serif text-4xl md:text-5xl text-black mb-2">New Password</h1>
        </div>

        {% if validlink %}
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                {{ form.new_password1 }}
                {{ form.new_password2 }}
            </div>
            <button type="submit" class="w-full bg-black text-white uppercase text-xs font-bold tracking-[0.2em] py-4 hover:bg-[#FB7185] transition-all duration-300 shadow-lg">
                Set Password
            </button>
        </form>
        {% else %}
        <p class="text-center text-gray-500 text-xs tracking-widest uppercase">
            This reset link is invalid or has expired.
            <a href="{% url 'password_reset' %}" class="text-black border-b border-black">Request a new one</a>.
        </p>
        {% endif %}

    </div>
</div>
{% endblock %}
